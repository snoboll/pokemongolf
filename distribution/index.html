<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bogeybeasts</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0c150c;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #dceede;
      padding: 24px;
    }
    .card {
      background: #172417;
      border: 1px solid #2c3c2c;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 360px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 88px;
      height: 88px;
      background: rgba(87,242,135,0.1);
      border: 1.5px solid rgba(87,242,135,0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 40px;
      box-shadow: 0 0 32px rgba(87,242,135,0.2);
    }
    h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
    .subtitle { color: rgba(220,238,220,0.55); font-size: 15px; margin-bottom: 32px; }
    .install-btn {
      display: block;
      background: #57f287;
      color: #003915;
      font-size: 17px;
      font-weight: 700;
      padding: 16px 32px;
      border-radius: 14px;
      text-decoration: none;
      letter-spacing: 0.3px;
      margin-bottom: 12px;
      transition: opacity 0.15s;
    }
    .install-btn:active { opacity: 0.8; }
    .note {
      font-size: 13px;
      color: rgba(220,238,220,0.4);
      line-height: 1.5;
    }
    .version {
      margin-top: 24px;
      font-size: 12px;
      color: rgba(220,238,220,0.3);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⛳</div>
    <h1>Bogeybeasts</h1>
    <p class="subtitle">Catch 'em on the course</p>
    <a class="install-btn" href="itms-services://?action=download-manifest&url=https://cuwcunjtervjelgomeil.supabase.co/storage/v1/object/public/app-distribution/manifest.plist">
      Install App
    </a>
    <p class="note">Open this page in Safari on your iPhone.<br>Tap Install App to begin.</p>
    <p class="version">v1.1.0</p>
  </div>
</body>
</html>
